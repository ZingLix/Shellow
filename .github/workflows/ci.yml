name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  ZIG_VERSION: 0.15.2

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - uses: mlugg/setup-zig@v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android
      - uses: mlugg/setup-zig@v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Install native build tools
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager_bin="$(command -v sdkmanager || true)"
          if [ -z "$sdkmanager_bin" ]; then
            for sdk_root in "${ANDROID_HOME:-}" "${ANDROID_SDK_ROOT:-}"; do
              if [ -x "$sdk_root/cmdline-tools/latest/bin/sdkmanager" ]; then
                sdkmanager_bin="$sdk_root/cmdline-tools/latest/bin/sdkmanager"
                break
              fi
            done
          fi
          if [ -z "$sdkmanager_bin" ]; then
            echo "::error::sdkmanager was not found in PATH, ANDROID_HOME, or ANDROID_SDK_ROOT"
            exit 127
          fi
          yes | "$sdkmanager_bin" --licenses >/dev/null || true
          "$sdkmanager_bin" "ndk;27.1.12297006" "cmake;3.22.1"
      - run: ./scripts/build-android-rust.sh
      - working-directory: apps/android
        run: ./gradlew :app:testDebugUnitTest :app:assembleDebug :app:lintDebug --no-daemon

  ios:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 26.4.1
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim
      - name: Install Zig
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: brew install zig@0.15
      - name: Add Zig to PATH
        run: echo "$(brew --prefix zig@0.15)/bin" >> "$GITHUB_PATH"
      - run: ./scripts/build-ios-rust.sh
      - run: >-
          xcodebuild -project apps/ios/Shellow.xcodeproj -scheme Shellow
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath "$RUNNER_TEMP/ShellowDerivedData"
          CODE_SIGNING_ALLOWED=NO ONLY_ACTIVE_ARCH=YES ARCHS=arm64 build
