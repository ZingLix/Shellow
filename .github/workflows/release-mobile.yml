name: Release Mobile

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to release
        type: choice
        default: all
        options:
          - all
          - android
          - ios
      android_track:
        description: Google Play track; alpha is the default closed testing track
        type: choice
        default: alpha
        options:
          - alpha
          - internal
          - beta
          - production
          - internalsharing
      release_status:
        description: Google Play release status
        type: choice
        default: completed
        options:
          - completed
          - draft
          - inProgress
          - halted
      version_name:
        description: Optional store version name, for example 0.1.1
        required: false
        type: string
      build_only:
        description: Build the iOS Rust framework without signing or publishing
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: false

env:
  ZIG_VERSION: 0.15.2
  XCODE_VERSION: 26.4.1

jobs:
  android-google-play:
    name: Android to Google Play
    runs-on: ubuntu-latest
    environment: mobile-release
    if: ${{ github.event_name == 'push' || contains(fromJSON('["all","android"]'), github.event.inputs.platform) }}
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Android release secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD \
            GOOGLE_PLAY_SERVICE_ACCOUNT_JSON
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name secret is required for Android release"
              missing=1
            fi
          done
          exit "$missing"

      - name: Resolve release version
        id: android-version
        shell: bash
        env:
          INPUT_VERSION_NAME: ${{ github.event.inputs.version_name }}
        run: |
          set -euo pipefail
          build_date="$(date -u +'%y%m%d')"
          run_suffix=$((10#$GITHUB_RUN_NUMBER % 1000))
          version_code=$((10#$build_date * 1000 + run_suffix))
          short_sha="${GITHUB_SHA::12}"
          version_name="$INPUT_VERSION_NAME"
          if [ -z "$version_name" ] && [ "$GITHUB_REF_TYPE" = "tag" ]; then
            version_name="${GITHUB_REF_NAME#v}"
          fi
          version_name="${version_name:-0.1.0-nightly.$build_date}"
          echo "ANDROID_BUILD_DATE=$build_date" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION_CODE=$version_code" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION_NAME=$version_name" >> "$GITHUB_ENV"
          echo "SHELLOW_GIT_COMMIT=$short_sha" >> "$GITHUB_ENV"
          echo "build_date=$build_date" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Set up Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Cache Rust and Zig build output
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
            work/zig-global-cache
          key: ${{ runner.os }}-android-rust-zig-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-android-rust-zig-

      - name: Install Android SDK components
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager_bin="$(command -v sdkmanager || true)"
          if [ -z "$sdkmanager_bin" ]; then
            for sdk_root in "${ANDROID_HOME:-}" "${ANDROID_SDK_ROOT:-}"; do
              if [ -x "$sdk_root/cmdline-tools/latest/bin/sdkmanager" ]; then
                sdkmanager_bin="$sdk_root/cmdline-tools/latest/bin/sdkmanager"
                break
              fi
            done
          fi
          if [ -z "$sdkmanager_bin" ]; then
            echo "::error::sdkmanager was not found in PATH, ANDROID_HOME, or ANDROID_SDK_ROOT"
            exit 127
          fi
          yes | "$sdkmanager_bin" --licenses >/dev/null || true
          "$sdkmanager_bin" "ndk;27.1.12297006" "cmake;3.22.1"

      - name: Decode Android upload key
        shell: bash
        run: |
          set -euo pipefail
          keystore_path="$RUNNER_TEMP/shellow-upload.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          echo "ANDROID_KEYSTORE_FILE=$keystore_path" >> "$GITHUB_ENV"

      - name: Build Android Rust libraries
        run: ./scripts/build-android-rust.sh

      - name: Build release app bundle
        working-directory: apps/android
        run: ./gradlew :app:bundleRelease --no-daemon

      - name: Upload Android app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: shellow-android-aab
          path: apps/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: xyz.zinglix.shellow
          releaseFiles: apps/android/app/build/outputs/bundle/release/app-release.aab
          tracks: ${{ github.event.inputs.android_track || 'alpha' }}
          status: ${{ github.event.inputs.release_status || 'completed' }}
          releaseName: ${{ github.ref_type == 'tag' && github.ref_name || format('nightly-{0}', steps.android-version.outputs.build_date) }}

      - name: Download Play-signed universal APK
        id: play-signed-apk
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          PACKAGE_NAME: xyz.zinglix.shellow
          VERSION_CODE: ${{ steps.android-version.outputs.version_code }}
        run: |
          set -euo pipefail
          output_dir="$RUNNER_TEMP/play-signed-apk"
          metadata_path="$output_dir/generated-apks.json"
          apk_path="$output_dir/shellow-android-play-signed-nightly.apk"
          api_base="https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE_NAME/generatedApks/$VERSION_CODE"
          mkdir -p "$output_dir"

          credentials_path="$output_dir/google-play-service-account.json"
          private_key_path="$output_dir/google-play-service-account.key"
          token_response_path="$output_dir/google-play-token.json"
          printf '%s' "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > "$credentials_path"
          jq -r '.private_key' "$credentials_path" > "$private_key_path"
          client_email="$(jq -r '.client_email' "$credentials_path")"

          base64_urlencode() {
            openssl base64 -A | tr '+/' '-_' | tr -d '='
          }

          now="$(date +%s)"
          expires_at="$((now + 3600))"
          header="$(printf '%s' '{"alg":"RS256","typ":"JWT"}' | base64_urlencode)"
          claim="$(
            jq -cn \
              --arg iss "$client_email" \
              --arg scope "https://www.googleapis.com/auth/androidpublisher" \
              --arg aud "https://oauth2.googleapis.com/token" \
              --argjson iat "$now" \
              --argjson exp "$expires_at" \
              '{iss:$iss,scope:$scope,aud:$aud,iat:$iat,exp:$exp}'
          )"
          claim_segment="$(printf '%s' "$claim" | base64_urlencode)"
          unsigned_jwt="$header.$claim_segment"
          signature="$(printf '%s' "$unsigned_jwt" | openssl dgst -binary -sha256 -sign "$private_key_path" | base64_urlencode)"
          assertion="$unsigned_jwt.$signature"

          curl -sS -f \
            -X POST "https://oauth2.googleapis.com/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer" \
            --data-urlencode "assertion=$assertion" \
            -o "$token_response_path"
          access_token="$(jq -r '.access_token // empty' "$token_response_path")"
          if [ -z "$access_token" ]; then
            echo "::error::Could not obtain a Google Play access token"
            jq '.' "$token_response_path"
            exit 1
          fi
          echo "::add-mask::$access_token"

          for attempt in $(seq 1 30); do
            http_code="$(
              curl -sS \
                -H "Authorization: Bearer $access_token" \
                -w '%{http_code}' \
                -o "$metadata_path" \
                "$api_base"
            )"
            if [ "$http_code" = "200" ]; then
              break
            fi
            if [ "$attempt" = "30" ]; then
              echo "::error::Google Play generated APK metadata was not available for versionCode $VERSION_CODE (HTTP $http_code)"
              cat "$metadata_path" || true
              exit 1
            fi
            sleep 20
          done

          download_id="$(jq -r '[.generatedApks[]?.generatedUniversalApk?.downloadId // empty][0] // empty' "$metadata_path")"
          if [ -z "$download_id" ]; then
            echo "::error::Google Play did not return a universal APK for versionCode $VERSION_CODE"
            jq '.' "$metadata_path"
            exit 1
          fi

          curl -sS -L -f \
            -H "Authorization: Bearer $access_token" \
            "$api_base/downloads/$download_id:download" \
            -o "$apk_path"

          ls -lh "$apk_path"
          echo "apk_path=$apk_path" >> "$GITHUB_OUTPUT"

      - name: Publish nightly GitHub release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          APK_PATH: ${{ steps.play-signed-apk.outputs.apk_path }}
          BUILD_DATE: ${{ steps.android-version.outputs.build_date }}
          VERSION_CODE: ${{ steps.android-version.outputs.version_code }}
          VERSION_NAME: ${{ steps.android-version.outputs.version_name }}
        run: |
          set -euo pipefail
          notes_path="$RUNNER_TEMP/nightly-release-notes.md"
          {
            echo "Nightly Android build updated from $GITHUB_SHA."
            echo
            echo "- Version: $VERSION_NAME ($VERSION_CODE)"
            echo "- Build date: $BUILD_DATE"
            echo "- Commit: $GITHUB_SHA"
            echo "- Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo
            echo "## Install"
            echo
            echo "### Android APK"
            echo
            echo "Download **\`shellow-android-play-signed-nightly.apk\`** from the **Assets** section below, then open it on your Android device. Android may ask you to allow installation from your browser or file manager."
            echo
            echo "### Google Play beta"
            echo
            echo "1. Join the [Shellow test group](https://groups.google.com/g/shellow-test) with the Google account used by Google Play."
            echo "2. Open the [Google Play testing page](https://play.google.com/apps/testing/xyz.zinglix.shellow) with the same account and opt in."
            echo "3. Install Shellow from Google Play. Access may take a few minutes after joining the group."
            echo
            echo "> **Note:** Google Play may show a price or payment warning. This is part of the test setup—you will not be charged and do not need to make a real payment."
            echo
            echo "### iOS"
            echo
            echo "Install the latest beta through [TestFlight](https://testflight.apple.com/join/EFnQTH4T). Apple may report that the beta is full or unavailable when all tester slots are occupied."
          } > "$notes_path"

          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/nightly" >/dev/null 2>&1; then
            gh api \
              --method PATCH \
              "repos/$GITHUB_REPOSITORY/git/refs/tags/nightly" \
              -f sha="$GITHUB_SHA" \
              -F force=true >/dev/null
          else
            gh api \
              --method POST \
              "repos/$GITHUB_REPOSITORY/git/refs" \
              -f ref="refs/tags/nightly" \
              -f sha="$GITHUB_SHA" >/dev/null
          fi

          if gh release view nightly >/dev/null 2>&1; then
            gh release edit nightly \
              --title "Nightly Android" \
              --notes-file "$notes_path" \
              --prerelease \
              --target "$GITHUB_SHA"
          else
            gh release create nightly \
              --title "Nightly Android" \
              --notes-file "$notes_path" \
              --prerelease \
              --latest=false \
              --target "$GITHUB_SHA"
          fi
          gh release upload nightly "$APK_PATH#shellow-android-play-signed-nightly.apk" --clobber

  ios-app-store-connect:
    name: iOS to App Store Connect
    runs-on: macos-26
    environment: mobile-release
    if: ${{ github.event_name == 'push' || contains(fromJSON('["all","ios"]'), github.event.inputs.platform) }}
    env:
      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Show Xcode environment
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Validate iOS release secrets
        if: ${{ !inputs.build_only }}
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in \
            IOS_TEAM_ID \
            APP_STORE_CONNECT_API_KEY_ID \
            APP_STORE_CONNECT_ISSUER_ID \
            APP_STORE_CONNECT_API_KEY_P8_BASE64
          do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name secret is required for iOS release"
              missing=1
            fi
          done
          exit "$missing"

      - name: Resolve release version
        shell: bash
        env:
          INPUT_VERSION_NAME: ${{ github.event.inputs.version_name }}
        run: |
          set -euo pipefail
          version_name="$INPUT_VERSION_NAME"
          if [ -z "$version_name" ] && [ "$GITHUB_REF_TYPE" = "tag" ]; then
            version_name="${GITHUB_REF_NAME#v}"
          fi
          echo "IOS_BUILD_NUMBER=$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"
          echo "IOS_MARKETING_VERSION=${version_name:-0.1.0}" >> "$GITHUB_ENV"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Set up Zig
        shell: bash
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: |
          set -euo pipefail
          brew install zig@0.15
          echo "$(brew --prefix zig@0.15)/bin" >> "$GITHUB_PATH"

      - name: Isolate Zig cache directories
        shell: bash
        run: |
          set -euo pipefail
          echo "ZIG_GLOBAL_CACHE_DIR=$GITHUB_WORKSPACE/work/zig-global-cache" >> "$GITHUB_ENV"
          echo "ZIG_LOCAL_CACHE_DIR=$GITHUB_WORKSPACE/work/zig-local-cache" >> "$GITHUB_ENV"

      - name: Show Zig environment
        shell: bash
        run: |
          set -euo pipefail
          uname -m
          sw_vers
          command -v zig
          zig version
          zig env

      - name: Cache Rust and Zig dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            work/zig-global-cache/p
          key: ${{ runner.os }}-${{ runner.arch }}-ios-xcode-${{ env.XCODE_VERSION }}-zig-${{ env.ZIG_VERSION }}-deps-v2-${{ hashFiles('Cargo.lock', 'crates/libghostty-vt-sys/build.rs', 'scripts/libghostty-vt-env.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-ios-xcode-${{ env.XCODE_VERSION }}-zig-${{ env.ZIG_VERSION }}-deps-v2-

      - name: Build iOS Rust framework
        run: ./scripts/build-ios-rust.sh

      - name: Prepare App Store Connect API key
        if: ${{ !inputs.build_only }}
        shell: bash
        run: |
          set -euo pipefail

          base64_decode() {
            if base64 --help 2>&1 | grep -q -- '--decode'; then
              base64 --decode
            else
              base64 -D
            fi
          }

          asc_key_path="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_P8_BASE64" | base64_decode > "$asc_key_path"
          chmod 600 "$asc_key_path"
          echo "APP_STORE_CONNECT_API_KEY_PATH=$asc_key_path" >> "$GITHUB_ENV"

      - name: Archive iOS app
        if: ${{ !inputs.build_only }}
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project apps/ios/Shellow.xcodeproj \
            -scheme Shellow \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/Shellow.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$APP_STORE_CONNECT_API_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            CURRENT_PROJECT_VERSION="$IOS_BUILD_NUMBER" \
            MARKETING_VERSION="$IOS_MARKETING_VERSION"

      - name: Upload archive to App Store Connect
        if: ${{ !inputs.build_only }}
        shell: bash
        run: |
          set -euo pipefail
          export_options="$RUNNER_TEMP/ExportOptions.plist"
          cat > "$export_options" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>upload</string>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>$IOS_TEAM_ID</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Shellow.xcarchive" \
            -exportPath "$RUNNER_TEMP/ShellowExport" \
            -exportOptionsPlist "$export_options" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$APP_STORE_CONNECT_API_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_API_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload iOS archive artifact
        if: ${{ always() && !inputs.build_only }}
        uses: actions/upload-artifact@v4
        with:
          name: shellow-ios-xcarchive
          path: ${{ runner.temp }}/Shellow.xcarchive
          if-no-files-found: ignore
